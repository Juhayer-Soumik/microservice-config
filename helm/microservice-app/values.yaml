replicaCount: 2

image:
  repository: ghcr.io/juhayer-soumik/microservice-app
  tag: "1e10157"
  pullPolicy: IfNotPresent

service:
  type: ClusterIP
  port: 80
  targetPort: 8080

resources:
  requests:
    cpu: 100m
    memory: 128Mi
  limits:
    cpu: 250m
    memory: 256Mi

autoscaling:
  enabled: true
  minReplicas: 2
  maxReplicas: 8
  targetCPUUtilizationPercentage: 60

probes:
  livenessPath: /health
  readinessPath: /ready

ingress:
  enabled: false
  host: microservice.local

env:
  SERVICE_NAME: microservice-app
  APP_VERSION: "0.1.0"
